<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pultec Agro · Real 25/26</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
:root{
  --g1:#1e4d26; --g2:#2d7a3a; --g3:#4a9e58; --gl:#eaf4ec; --gb:#c8e6cd;
  --gold:#b8922a; --goldl:#fdf5e0;
  --blue:#1a4f8a; --bluel:#e8f0fa;
  --red:#b83232; --redl:#fceaea;
  --gray:#5a6470;
  --brd:#d8e4da; --bg:#eef2ee; --wh:#fff;
  --txt:#1c2a1e; --txt2:#3d5042; --txt3:#7a8f7e;
  --sh:0 1px 4px rgba(0,0,0,.08); --shm:0 4px 20px rgba(0,0,0,.12);
  --r:6px; --rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;}

/* ── HEADER ── */
header{
  background:var(--wh);border-bottom:3px solid var(--g2);
  padding:0 32px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:var(--sh);
}
header img{height:40px;}
.hbadge{
  background:var(--g1);color:#fff;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  padding:4px 13px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;
}

/* ── BREADCRUMB ── */
.breadcrumb{
  background:var(--g1);padding:0 32px;
  display:flex;align-items:center;gap:0;min-height:42px;
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;
}
.bc-step{
  display:flex;align-items:center;
  color:rgba(255,255,255,.45);
  padding:0 14px 0 0;
  position:relative;
}
.bc-step.done{color:rgba(255,255,255,.75);cursor:pointer;}
.bc-step.done:hover .bc-label{text-decoration:underline;}
.bc-step.active{color:#fff;}
.bc-step .bc-num{
  width:20px;height:20px;border-radius:50%;
  border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;margin-right:7px;flex-shrink:0;
}
.bc-step.active .bc-num{background:#fff;color:var(--g1);border-color:#fff;}
.bc-step.done .bc-num{background:var(--gold);color:#fff;border-color:var(--gold);}
.bc-arrow{color:rgba(255,255,255,.25);margin:0 4px;font-size:10px;}
.bc-val{
  font-size:9px;font-weight:400;letter-spacing:.02em;
  color:var(--gold);display:block;margin-top:1px;text-transform:none;
}

/* ── MAIN LAYOUT ── */
.shell{display:flex;min-height:calc(100vh - 104px);}

/* ── PANEL SELECTOR (izquierda) ── */
.panel-sel{
  width:240px;min-width:200px;max-width:260px;
  background:#fafbfa;border-right:1px solid var(--brd);
  display:flex;flex-direction:column;
  position:sticky;top:62px;height:calc(100vh - 104px);overflow-y:auto;
}
.panel-sec{border-bottom:1px solid var(--brd);}
.panel-sec-hd{
  padding:13px 20px 11px;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);
  display:flex;align-items:center;justify-content:space-between;
  background:#f8fbf8;
}
.panel-sec-hd .step-num{
  width:18px;height:18px;border-radius:50%;
  background:var(--g2);color:#fff;
  font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.panel-item{
  padding:11px 20px;border-bottom:1px solid #f2f5f2;
  cursor:pointer;transition:background .1s;
  font-size:13px;color:var(--txt2);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-item:hover{background:var(--gl);}
.panel-item.active{
  background:var(--g1);color:#fff;font-weight:700;
}
.panel-item.active .pi-arrow{color:rgba(255,255,255,.5);}
.panel-item .pi-arrow{color:var(--txt3);font-size:11px;}
.panel-item .pi-meta{font-size:10px;color:var(--txt3);margin-top:1px;}
.panel-item.active .pi-meta{color:rgba(255,255,255,.6);}

/* cultivo badge inline */
.cb{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;font-family:'Montserrat',sans-serif;}
.cbMAIZ{background:#fff3e0;color:#c84b00;}
.cbSOJA{background:#e8f5e9;color:#2e7d32;}
.cbSOJA2DA{background:#f1f8e9;color:#558b2f;}
.cbTRIGO{background:#fef9e7;color:#9e6b00;}
.cbARVEJA{background:#e3f2fd;color:#1565c0;}
.cbSORGO{background:#fce4ec;color:#880e4f;}
.cbMAIZ2DA{background:#fff8e1;color:#e65100;}

/* toggle real/proy pequeño */
.toggle-rp{display:inline-flex;border:1px solid var(--brd);border-radius:14px;overflow:hidden;}
.toggle-rp button{
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;
  padding:3px 9px;border:none;background:transparent;color:var(--txt3);cursor:pointer;
}
.toggle-rp button.t-real{background:#dff0e4;color:var(--g1);}
.toggle-rp button.t-proy{background:#e8f0fa;color:var(--blue);}

/* campo toggle */
.campo-toggle{
  display:flex;align-items:center;gap:6px;
  padding:6px 20px 8px;background:#f4f8f4;
  border-bottom:1px solid var(--brd);
  font-size:11px;color:var(--txt3);
}

/* ── PANEL CONTENIDO (derecha) ── */
.panel-content{
  flex:1;overflow-y:auto;
  padding:0;
}

/* Estado vacío */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:12px;color:var(--txt3);
}
.empty-state .es-icon{font-size:48px;opacity:.3;}
.empty-state .es-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--txt3);}
.empty-state .es-sub{font-size:12px;}

/* ── RENTABILIDAD ── */
.rent-header{
  background:#fff;border-bottom:2px solid var(--brd);
  color:var(--txt);padding:14px 28px 12px;
}
.rent-header h3{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;margin-bottom:3px;}
.rent-header h3 span{color:var(--gold);}
.rent-header p{font-size:12px;opacity:.7;}
.rent-header-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.rent-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* TC input en header */
.tc-inline{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  border-radius:var(--r);padding:5px 10px;
}
.tc-inline label{font-size:10px;opacity:.7;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.tc-inline input{
  background:transparent;border:none;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;
  width:80px;outline:none;text-align:center;
}

/* ── KPIs ── */
.kpi-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;padding:20px 28px;background:var(--bg);
}
.kpi{
  background:var(--wh);border:1px solid var(--brd);border-radius:var(--rl);
  padding:14px 16px;box-shadow:var(--sh);
}
.kpi.kg{border-top:3px solid var(--g2);}
.kpi.kb{border-top:3px solid var(--blue);}
.kpi.ko{border-top:3px solid var(--gold);}
.kpi.kr{border-top:3px solid var(--red);}
.kpi-l{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;}
.kpi-v{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;line-height:1;}
.kpi-v.g{color:var(--g1);} .kpi-v.b{color:var(--blue);} .kpi-v.o{color:var(--gold);} .kpi-v.r{color:var(--red);}
.kpi-s{font-size:11px;color:var(--txt3);margin-top:3px;}

/* ── TABLA ── */
.tbl-wrap-outer{padding:0 28px 40px;}
.tbl-card{
  background:var(--wh);border:1px solid var(--brd);border-radius:var(--rl);
  box-shadow:var(--shm);overflow:hidden;margin-top:4px;
}
.tbl-card-hd{
  background:var(--g1);color:#fff;padding:12px 18px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
}
.tbl-wrap{overflow-x:auto;}

/* ── TABLA FILAS ── */
table{width:100%;border-collapse:collapse;font-size:12px;}

/* Header columnas */
.tr-col-hd td{
  background:#2a5c32;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  padding:9px 14px;border-right:1px solid rgba(255,255,255,.12);
  text-align:center;
}
.tr-col-hd td:first-child{text-align:left;min-width:200px;}

/* Separador de sección */
.tr-section td{
  background:#f0f6f0;padding:6px 14px;
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);
  border-bottom:1px solid var(--brd);border-right:1px solid #e8f0e8;
}

/* Fila dato normal */
.tr-data td{
  padding:8px 14px;border-bottom:1px solid #f0f4f0;border-right:1px solid #f2f5f2;
  text-align:right;color:var(--txt);vertical-align:middle;
}
.tr-data td:first-child{text-align:left;color:var(--txt2);padding-left:16px;}
.tr-data:hover td{background:#f8fbf8;}

/* Fila destacada (subtotales) */
.tr-sub td{
  padding:9px 14px;border-bottom:1px solid var(--gb);border-right:1px solid #d4e8d6;
  text-align:right;background:#eef8f0;font-weight:700;color:var(--g1);
}
.tr-sub td:first-child{text-align:left;padding-left:14px;}

/* Margen operativo */
.tr-mo td{
  padding:9px 14px;border-bottom:1px solid #b8d0ee;border-right:1px solid #c8daea;
  text-align:right;background:#e8f0fa;font-weight:700;color:var(--blue);
}
.tr-mo td:first-child{text-align:left;}

/* Gastos comerciales */
.tr-gc td{
  padding:8px 14px;border-bottom:1px solid #e0c060;border-right:1px solid #e0c060;
  text-align:right;background:#f5d96a;font-weight:700;color:#4a2a00;
}
.tr-gc td:first-child{
  background:#b8922a;color:#fff;text-align:left;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
}

/* Bottom line */
.tr-bl td{
  padding:10px 14px;border-right:1px solid rgba(255,255,255,.12);
  text-align:right;background:var(--g1);
  font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:#fff;
}
.tr-bl td:first-child{text-align:left;}
.tr-bl td.neg{color:#ff9a9a;}
.tr-bl td.gold{color:var(--gold);}

/* Fila rubro (expandible) */
.tr-rubro td{
  padding:6px 14px 6px 20px;border-bottom:1px solid #edf2ed;border-right:1px solid #eef2ee;
  background:#fafdf8;color:var(--gray);font-size:12px;cursor:pointer;
}
.tr-rubro td:first-child{text-align:left;}
.tr-rubro td:not(:first-child){text-align:right;}
.tr-rubro:hover td{background:#f5fcf5;}

/* Fila insumo (detalle) */
.tr-ins td{
  padding:5px 14px 5px 34px;border-bottom:1px solid #f5f8f5;border-right:1px solid #f5f8f5;
  background:#fefffe;color:var(--txt3);font-size:11px;
}
.tr-ins td:not(:first-child){text-align:right;}
.tr-ins:hover td{background:#f8fff8;}

/* inputs */
.ri{width:64px;text-align:center;padding:3px 5px;border:1px solid var(--gb);
  border-radius:4px;font-family:'Lato',sans-serif;font-size:12px;color:var(--g1);
  background:#f0f7f1;outline:none;font-weight:700;}
.ri:focus{border-color:var(--g2);background:#fff;box-shadow:0 0 0 2px rgba(45,122,58,.15);}
.ri-b{color:var(--blue)!important;background:#eaf0fd!important;border-color:#b8d0ee!important;}

/* precio input inline */
.precio-in{
  width:90px;text-align:right;padding:4px 8px;
  border:1px solid var(--brd);border-radius:4px;
  font-family:'Lato',sans-serif;font-size:12px;font-weight:700;color:var(--blue);
  background:#eaf0fd;outline:none;
}
.precio-in:focus{border-color:var(--blue);background:#fff;}

/* botones */
.btn{
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  padding:6px 14px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;
}
.btn-g{background:var(--g3);color:#fff;} .btn-g:hover{background:var(--g2);}
.btn-b{background:var(--blue);color:#fff;} .btn-b:hover{background:#153d6e;}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);}
.btn-ghost:hover{background:rgba(255,255,255,.25);}
.btn-sm{padding:4px 10px;font-size:9px;}

/* GC config popup */
.gc-config{
  background:var(--goldl);border:1px solid #e0c060;border-radius:var(--rl);
  padding:16px 20px;margin:0 28px 20px;
}
.gc-config h4{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;}
.gc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.gc-row label{font-size:11px;font-weight:700;min-width:130px;color:var(--txt2);}
.gc-row input{width:80px;padding:5px 8px;border:1px solid #d4c060;border-radius:4px;font-size:12px;font-weight:700;color:#4a2a00;background:#fff;outline:none;}
.gc-row input:focus{border-color:var(--gold);}

footer{background:var(--g1);color:rgba(255,255,255,.6);text-align:center;padding:14px;font-size:11px;font-family:'Montserrat',sans-serif;letter-spacing:.04em;}
footer strong{color:#fff;}


/* ═══ PILOT REDESIGN ═══ */

/* Header: blanco limpio con acento verde */
header {
  background:#fff !important;
  border-bottom:2px solid var(--g2) !important;
  box-shadow:0 1px 8px rgba(0,0,0,.06) !important;
}
header .hbadge {
  background:var(--g2);
  font-size:9px;
  letter-spacing:.1em;
}

/* Nav tabs: más sutiles */
.nav-tab {
  font-size:10px !important;
  padding:10px 18px !important;
  letter-spacing:.08em;
}

/* Breadcrumb: línea limpia en vez de fondo oscuro */
.breadcrumb {
  background:#fff !important;
  border-bottom:1px solid var(--brd) !important;
  padding:8px 24px !important;
}
.bc-num {
  background:var(--g2) !important;
  width:20px !important; height:20px !important;
  font-size:9px !important;
}
.bc-step.active .bc-num { background:var(--g1) !important; }
.bc-label { font-size:9px !important; }
.bc-val   { font-size:11px !important; font-weight:700; }

/* Panel selector: más minimalista */
.panel-sec-hd {
  background:#f6f8f6 !important;
  border-bottom:1px solid var(--brd) !important;
  padding:8px 16px !important;
  font-size:9px !important;
  letter-spacing:.1em;
  color:var(--txt3) !important;
}
.panel-item {
  padding:9px 16px !important;
  font-size:12px !important;
}
.panel-item.active {
  background:var(--gl) !important;
  border-left:3px solid var(--g2) !important;
  padding-left:13px !important;
}
.panel-item:hover { background:#f8fbf8 !important; }
.pi-meta { font-size:10px !important; margin-top:1px; }

/* Rent header: limpio, blanco */
.rent-header {
  background:#fff !important;
  border-bottom:1px solid var(--brd) !important;
  color:var(--txt) !important;
  padding:14px 24px 12px !important;
}
.rent-header h3 {
  color:var(--g1) !important;
  font-size:14px !important;
}
.rent-header p { color:var(--txt3) !important; }
.rent-actions .tc-inline {
  background:#f6f8f6 !important;
  border:1px solid var(--brd) !important;
  color:var(--txt) !important;
}
.rent-actions .tc-inline label { color:var(--txt3) !important; }
.rent-actions .tc-inline input { color:var(--txt) !important; }

/* KPI cards: más compactos */
.kpi-row { padding:12px 24px 0 !important; gap:8px !important; }
.kpi {
  padding:10px 14px !important;
  border-radius:8px !important;
}
.kpi-l { font-size:8px !important; margin-bottom:3px; }
.kpi-v { font-size:18px !important; }
.kpi-s { font-size:10px !important; }

/* Table card: sin sombra pesada */
.tbl-card { box-shadow:0 1px 4px rgba(0,0,0,.07) !important; }
.tbl-card-hd {
  background:#f6f8f6 !important;
  color:var(--txt2) !important;
  font-size:10px !important;
  padding:10px 16px !important;
  border-bottom:1px solid var(--brd) !important;
}

/* Bottom line row: sutil pero marcado */
/* (ya viene con estilos inline) */

/* Refresh button: floating más sutil */
#refreshBtn {
  background:var(--g1) !important;
  opacity:.7;
}
#refreshBtn:hover { opacity:1; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<!-- LOGIN SCREEN -->

const getTC = () => parseFloat($('inputTC')?.value || 1180) || 1180;
const toUSD = ars => ars / getTC();
const getP  = cult => precios[cult] || 100;
const keyLC = (lote, cult) => lote + '||' + cult;
const keyCC = (cli,  cult) => cli  + '||' + cult;

function badgeCls(c) { return 'cb cb' + c.replace(/ /g,'').replace('/',''); }

function getLotes(cliente) {
  return [
    ...MAESTRO.filter(r => r.cliente === cliente),
    ...(extraCultivos[cliente] || [])
  ];
}

function getCultivos(cliente) {
  const del = deletedCultivos[cliente] || new Set();
  return [...new Set(getLotes(cliente).map(r => r.cultivo))].filter(c => !del.has(c));
}

function getLotesByCult(cliente, cultivo) {
  return getLotes(cliente).filter(r => r.cultivo === cultivo);
}

function getCampos(cliente, cultivo) {
  return [...new Set(getLotesByCult(cliente, cultivo).map(r => r.campo))];
}

function getMode(cliente, cultivo) {
  return cultivoMode[keyCC(cliente, cultivo)] || 'proy';
}

function getRinde(lote, cultivo, mode) {
  const k = keyLC(lote, cultivo);
  const ov = rindesOv[k] || {};
  if (mode === 'real') {
    if (ov.real != null) return ov.real;
    const m = MAESTRO.find(r => r.lote === lote && r.cultivo === cultivo);
    return m ? m.rindeReal : null;
  } else {
    if (ov.proy != null) return ov.proy;
    const m = MAESTRO.find(r => r.lote === lote && r.cultivo === cultivo);
    return m ? m.rindeEst : 0;
  }
}

function getGastosLote(lote, cultivo) {
  return LABORES[keyLC(lote, cultivo)] || [];
}

function costoHaInsumo(r) {
  // r = [rubro, producto, dosis, um, costo_ha, costo_u]
  // r[4] = costo/ha ya calculado (col T del Excel = dosis × costo_unitario)
  return r[4] || 0;
}
function totalGastosLote(lote, cultivo, ha) {
  // total = costo_ha × ha_app
  const haVal = ha || 0;
  return getGastosLote(lote, cultivo).reduce((s, r) => s + costoHaInsumo(r) * haVal, 0);
}

function calcLote(lote, cultivo, mode) {
  const rinde  = getRinde(lote, cultivo, mode) || 0;
  const ha     = lote._ha != null ? lote._ha : lote.ha;
  const tn     = rinde * ha;
  const ventas = tn * getP(cultivo);
  const gastos = totalGastosLote(lote.lote, cultivo, ha);
  return { ha, rinde, tn, ventas, gastos, mo: ventas - gastos };
}

// ═══════════════════════════════════════════
// INIT — popular panel izquierdo: clientes
// ═══════════════════════════════════════════
function init() {
  const clientes = [...new Set(MAESTRO.map(r => r.cliente))].sort();
  let html = '';
  clientes.forEach(c => {
    html += `<div class="panel-item" onclick="selectCliente('${c.replace(/'/g,"\\'")}')" id="cli_${slugify(c)}">
      <div>
        <div>${c.split(' ').map(w => w[0].toUpperCase()+w.slice(1).toLowerCase()).join(' ')}</div>
      </div>
      <span class="pi-arrow">›</span>
    </div>`;
  });
  $('listaClientes').innerHTML = html;
}

function slugify(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

// ═══════════════════════════════════════════
// PASO 1 — seleccionar cliente
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// NUEVA NAVEGACIÓN: Cliente → Cultivo → Lote
// (sin campo)
// ═══════════════════════════════════════════

function renderCultivos() {
  const cultivos = getCultivos(selCliente);
  let html = '';
  cultivos.forEach(cult => {
    const lotes = getLotesByCult(selCliente, cult);
    const ha    = lotes.reduce((s,l) => s + (l.ha||0), 0);
    const hasReal = lotes.some(l => {
      const m = MAESTRO.find(r => r.lote===l.lote && r.cultivo===cult);
      return m && m.rindeReal != null;
    });
    const isActive = selCultivo === cult;
    html += `<div class="panel-item${isActive?' active':''}" onclick="selectCultivo('${cult.replace(/'/g,"\\'")}') " id="cult_${slugify(cult)}">
      <div>
        <span class="${badgeCls(cult)}" style="font-size:10px;">${cult}</span>
        <div class="pi-meta">${Math.round(ha).toLocaleString('es-AR')} ha · ${hasReal?'✓ con real':'sin real'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <button onclick="event.stopPropagation();delCultivo('${cult.replace(/'/g,"\\'")}');"
          style="font-size:9px;padding:1px 6px;border:1px solid ${isActive?'rgba(255,255,255,.4)':'#ddd'};border-radius:4px;background:transparent;color:${isActive?'rgba(255,255,255,.6)':'#aaa'};cursor:pointer;">✕</button>
      </div>
    </div>`;
  });
  $('listaCultivos').innerHTML = html;
}

function selectCliente(cliente) {
  selCliente = cliente;
  selCultivo = null;
  selLote    = null;

  document.querySelectorAll('.panel-item[id^="cli_"]').forEach(el => el.classList.remove('active'));
  $(`cli_${slugify(cliente)}`).classList.add('active');

  updateBreadcrumb();
  renderCultivos();
  $('secCultivo').style.display = '';
  $('secLote').style.display = 'none';

  // Al seleccionar cliente → mostrar rentabilidad consolidada
  renderRentabilidadCliente();
}

function selectCultivo(cultivo) {
  selCultivo = cultivo;
  selLote    = null;

  updateBreadcrumb();
  renderCultivos();
  renderLotes();
  $('secLote').style.display = '';

  // Al seleccionar cultivo → mostrar rentabilidad consolidada del cultivo
  renderRentabilidadCliente();
}

function selectLote(loteNombre) {
  selLote = loteNombre;
  updateBreadcrumb();
  renderLotes();
  renderRentabilidad();
}

function renderLotes() {
  const lotes = getLotesByCult(selCliente, selCultivo);
  let html = '';
  lotes.forEach(l => {
    const isActive = selLote === l.lote;
    const k = keyLC(l.lote, selCultivo);
    const ov = rindesOv[k] || {};
    const mRow = MAESTRO.find(r => r.lote === l.lote && r.cultivo === selCultivo);
    const hasReal = ov.real != null || (mRow && mRow.rindeReal != null);
    html += `<div class="panel-item${isActive?' active':''}" onclick="selectLote('${l.lote.replace(/'/g,"\\'")}') " id="lote_${slugify(l.lote)}">
      <div>
        <div style="font-weight:700;">${l.lote}</div>
        <div class="pi-meta">${l.ha} ha · ${l.campo} · ${hasReal?'✓ real':'sin real'}</div>
      </div>
      <span class="pi-arrow">›</span>
    </div>`;
  });
  $('listaLotes').innerHTML = html;
}

// Rentabilidad consolidada: muestra todos los lotes del cliente (o del cultivo si está seleccionado)
// ═══════════════════════════════════════════
// RENDER CONSOLIDADO: Cliente o Cliente+Cultivo
// Mismo esquema vertical que el lote individual
// ═══════════════════════════════════════════
function renderRentabilidadCliente() {
  if (!selCliente) return;  // guard: no client selected
  const tc  = getTC();
  const nd  = '<span style="color:#c0c8c0;font-size:11px;">s/d</span>';
  const usd = n => n != null ? 'USD ' + Math.round(n).toLocaleString('es-AR') : nd;
  const N3  = n => n != null ? n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';

  const BG_P='#eef3fa', BG_PB='#d8e8f5', C_P='#1a3a6a';
  const BG_R='#eaf4ec', BG_RB='#d8eeda', C_R='#1e4d26';
  const HP='#1a4f8a', HR='#1e4d26';

  const tdR  = (bg,col,fw,val) => '<td style="text-align:right;padding:8px 14px;border-right:1px solid rgba(0,0,0,.06);background:'+bg+';color:'+col+';font-weight:'+(fw||'400')+';">'+val+'</td>';
  const tdRL = (bg,col,fw,val) => '<td style="text-align:right;padding:8px 14px;background:'+bg+';color:'+col+';font-weight:'+(fw||'400')+';">'+val+'</td>';
  const tdL  = (sty,val)       => '<td style="padding:8px 14px;border-right:1px solid var(--brd);'+sty+'">'+val+'</td>';

  // Cultivos a procesar
  const cultivos = selCultivo ? [selCultivo] : getCultivos(selCliente);

  // ── Calcular totales acumulando todos los lotes de todos los cultivos ──
  let totHa=0, totTnP=0, totTnR=0, totVentasP=0, totVentasR=0;
  let totGastos=0, hasAnyReal=false;

  // Por cultivo: acumular lotes
  const cultData = cultivos.map(cult => {
    const pOv    = precioOv[keyCC(selCliente, cult)] || {};
    const precioP = pOv.proy != null ? pOv.proy : getP(cult);
    const precioR = pOv.real != null ? pOv.real : getP(cult);
    const lotes  = getLotesByCult(selCliente, cult);
    let cHa=0, cTnP=0, cTnR=0, cVP=0, cVR=0, cGO=0, cHasReal=false;
    lotes.forEach(l => {
      const ha  = l.ha;
      const k   = keyLC(l.lote, cult);
      const ov  = rindesOv[k] || {};
      const mRow= MAESTRO.find(r => r.lote===l.lote && r.cultivo===cult);
      const rP  = ov.proy != null ? ov.proy : (mRow ? (mRow.rindeEst||0) : 0);
      const rR  = ov.real != null ? ov.real : (mRow && mRow.rindeReal!=null ? mRow.rindeReal : rP); // default = proy
      cHa  += ha;
      cTnP += rP * ha;
      cVP  += rP * ha * precioP / tc;
      if (rR != null) { cTnR += rR * ha; cVR += rR * ha * precioR / tc; cHasReal = true; }
      cGO  += totalGastosLote(l.lote, cult, ha) + getAlquiler(l.lote, cult, ha).total;
    });
    const pctGC = gastosComerciales.pct[cult] || 0;
    const cGCP  = cVP * pctGC;
    const cGCR  = cHasReal ? cVR * pctGC : null;
    totHa      += cHa;
    totTnP     += cTnP;
    if (cHasReal) { totTnR += cTnR; hasAnyReal = true; }
    totVentasP += cVP;
    if (cHasReal) totVentasR += cVR;
    totGastos  += cGO;
    return { cult, ha:cHa, tnP:cTnP, tnR:cHasReal?cTnR:null, vP:cVP, vR:cHasReal?cVR:null, go:cGO, gcP:cGCP, gcR:cGCR, hasReal:cHasReal, precioP, precioR, lotes };
  });

  // Totales GC y MO
  const totGCP = cultData.reduce((s,c) => s + c.gcP, 0);
  const totGCR = hasAnyReal ? cultData.reduce((s,c) => s + (c.gcR||0), 0) : null;
  const totMOP = totVentasP - totGastos - totGCP;
  const totMOR = hasAnyReal ? totVentasR - totGastos - (totGCR||0) : null;
  const totBLP = totMOP;
  const totBLR = totMOR;

  // Rubros: acumular gastos de todos los lotes de todos los cultivos
  const rubroMap = {};
  cultData.forEach(cd => {
    cd.lotes.forEach(l => {
      getGastosLote(l.lote, cd.cult).forEach(r => {
        const rub  = r[0] || 'Otros';
        const prod = r[1] || '—';
        const cHa  = r[3] || 0;          // costo/ha
        const tot  = cHa * l.ha;
        if (!rubroMap[rub]) rubroMap[rub] = { total:0, insumos:{} };
        rubroMap[rub].total += tot;
        if (!rubroMap[rub].insumos[prod]) rubroMap[rub].insumos[prod] = { dosis:r[2], costo_u:r[3], costo_ha:cHa, total:0 };
        rubroMap[rub].insumos[prod].total += tot;
      });
    });
  });
  // Rubros fijos siempre presentes, aunque no tengan valor
  const RUBROS_FIJOS = ['Alquileres','Coadyuvantes','Curasemillas','Fertilizantes','Fungicidas','Herbicidas','Insecticidas','Labores Contratadas','Semillas'];
  RUBROS_FIJOS.forEach(r => { if (!rubroMap[r]) rubroMap[r] = { total:0, insumos:{} }; });
  // Add Alquileres — accumulate across all lotes of all cultivos
  cultData.forEach(cd => {
    cd.lotes.forEach(l => {
      const aq = getAlquiler(l.lote, cd.cult, l.ha);
      rubroMap['Alquileres'].total += aq.total;
    });
  });
  // Orden: fijos primero, luego cualquier otro
  const rubros = [
    ...RUBROS_FIJOS,
    ...Object.keys(rubroMap).filter(r => !RUBROS_FIJOS.includes(r)).sort()
  ];
  window._rubroMap = rubroMap;
  window._rubros   = rubros;

  const isClienteView = !selCultivo;
  const title = isClienteView
    ? selCliente + ' · Todos los cultivos'
    : selCliente + ' · ' + selCultivo + ' · Todos los lotes';

  // Soja reference for header display
  const _firstCD = cultData[0];
  const refLoteGlobal = _firstCD?.lotes[0]?.lote || '';
  const _refCultGlobal = _firstCD?.cult || (selCultivo||'SOJA');
  const _aqRefG = alquileres[keyLC(refLoteGlobal, _refCultGlobal)] || {};
  const refSojaGlobal = (_aqRefG && _aqRefG.precioSoja != null) ? _aqRefG.precioSoja : (getP('SOJA') / Math.max(tc, 1));
  let h = '';

  // ── Header ──
  h += '<div class="rent-header"><div class="rent-header-row">'
    + '<div><h3><span>' + (selCultivo||selCliente) + '</span>' + (selCultivo?' · Todos los lotes':'') + '</h3>'
    + '<p>' + title + '</p></div>'
    + '<div class="rent-actions">'
    + '<div class="tc-inline"><label>TC $</label>'
    + '<input type="number" id="inputTC" min="1" step="10" value="'+tc+'" onchange="renderRentabilidadCliente()">'
    + '</div>'
    + '<div class="tc-inline" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);"><label style="opacity:.6;">Ref. Soja</label>'
    + '<input type="number" min="0" step="0.01" value="'+refSojaGlobal.toFixed(2)+'"'
    + ' data-aq-field="precioSoja" data-lote="'+refLoteGlobal+'" data-cult="'+(selCultivo||'SOJA')+'"'
    + ' style="background:transparent;border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;width:70px;outline:none;" />'
    + '<span style="font-size:10px;opacity:.5;">USD/tn</span></div>'
    + '<button class="btn btn-ghost btn-sm" onclick="toggleGCConfig()">' + ('⚙') + ' G. Comerciales</button>'
    + '</div></div></div>';

  // ── GC Config ──
  if (showGCConfig) {
    h += '<div class="gc-config"><h4>Gastos Comerciales — % sobre ventas (por cultivo)</h4>';
    cultivos.forEach(cult => {
      const escC = cult.replace(/'/g,"\\'");
      const pct  = (gastosComerciales.pct[cult]||0)*100;
      h += '<div class="gc-row"><label>' + cult + '</label>'
        + '<input type="number" min="0" max="100" step="0.1" value="'+pct.toFixed(1)+'"'
        + ' onchange="gastosComerciales.pct[\''+escC+'\']=parseFloat(this.value)/100||0;renderRentabilidadCliente();"'
        + ' style="width:70px;padding:5px 8px;border:1px solid var(--brd);border-radius:4px;font-size:13px;outline:none;" />'
        + '<span style="font-size:11px;color:var(--txt3);">%</span></div>';
    });
    h += '</div>';
  }

  // ── KPIs ──
  _refSj = refSojaGlobal || 0;
  h += '<div class="kpi-row">'
    + '<div class="kpi kb"><div class="kpi-l">Hectáreas</div><div class="kpi-v b">'+N3(totHa)+'</div><div class="kpi-s">'+cultivos.length+' cultivo'+(cultivos.length!==1?'s':'')+'</div></div>'
    + '<div class="kpi" style="border-top:3px solid '+HP+';"><div class="kpi-l">Ventas Proyectadas</div><div class="kpi-v" style="color:'+C_P+';">'+usd(totVentasP)+'</div></div>'
    + (hasAnyReal ? '<div class="kpi kg"><div class="kpi-l">Ventas Reales</div><div class="kpi-v g">'+usd(totVentasR)+'</div></div>' : '')
    + '<div class="kpi k'+(totBLP>=0?'g':'r')+'"><div class="kpi-l">Bottom Line Proy</div><div class="kpi-v '+(totBLP>=0?'g':'r')+'">'+usd(totBLP)+'</div><div class="kpi-s" style="font-weight:700;font-size:11px;margin-top:2px;">'+(_refSj>0?'= '+(totBLP/_refSj>=0?'+':'')+Math.round(totBLP/_refSj).toLocaleString('es-AR')+' tn soja':'')+'</div></div>'
    + (hasAnyReal&&totBLR!=null ? '<div class="kpi k'+(totBLR>=0?'g':'r')+'"><div class="kpi-l">Bottom Line Real</div><div class="kpi-v '+(totBLR>=0?'g':'r')+'">'+usd(totBLR)+'</div><div class="kpi-s" style="font-weight:700;font-size:11px;margin-top:2px;">'+(_refSj>0?'= '+(totBLR/_refSj>=0?'+':'')+Math.round(totBLR/_refSj).toLocaleString('es-AR')+' tn soja':'')+'</div></div>' : '')
    + '</div>';

  // ── TABLA VERTICAL ──
  h += '<div class="tbl-wrap-outer"><div class="tbl-card">'
    + '<div class="tbl-card-hd"><span>' + title + '</span></div>'
    + '<div class="tbl-wrap"><table id="rentTable">';

  // Headers
  h += '<tr>'
    + '<td style="background:#2a5c32;color:#fff;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;border-right:1px solid rgba(255,255,255,.15);min-width:220px;">Métrica</td>'
    + '<td style="text-align:center;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;border-right:1px solid rgba(255,255,255,.15);min-width:160px;background:'+HP+';color:#fff;">PROYECTADO</td>'
    + '<td style="text-align:center;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;min-width:160px;background:'+HR+';color:#fff;">REAL</td>'
    + '</tr>';

  // ── VENTAS (colapsable) ──
  h += '<tr data-action="toggle-ventas" style="cursor:pointer;">'
    + tdL('background:#f0f6f0;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--brd);',
        '<span style="margin-right:6px;">'+(ventasColapsada?'▶':'▼')+'</span>VENTAS')
    + tdR(BG_PB, C_P, '700', usd(totVentasP))
    + tdRL(BG_RB, C_R, '700', hasAnyReal?usd(totVentasR):nd)
    + '</tr>';

  if (!ventasColapsada) {
    // Hectáreas
    h += '<tr>'
      + tdL('padding-left:20px;font-size:12px;color:var(--txt2);', 'Hectáreas totales')
      + tdR(BG_P, C_P, '700', N3(totHa)+' ha')
      + tdRL(BG_R, C_R, '700', N3(totHa)+' ha')
      + '</tr>';

    // Por cultivo (o por lote si es vista de cultivo)
    cultData.forEach(cd => {
      if (isClienteView) {
        // Mostrar por cultivo clickeable
        h += '<tr style="cursor:pointer;" onclick="selectCultivo(\''+cd.cult.replace(/'/g,"\\'")+'\');">'
          + tdL('padding-left:20px;font-size:12px;',
              '<span class="cb cb'+cd.cult.replace(/ /g,'').replace('/','')+'">'+cd.cult+'</span>'
              + ' <span style="font-size:10px;color:var(--txt3);">'+N3(cd.ha)+' ha</span>')
          + tdR(BG_P, C_P, '', usd(cd.vP))
          + tdRL(BG_R, C_R, '', cd.vR!=null?usd(cd.vR):nd)
          + '</tr>';
      } else {
        // Vista de cultivo: mostrar por lote
        cd.lotes.forEach(l => {
          const ha  = l.ha;
          const k   = keyLC(l.lote, cd.cult);
          const ov  = rindesOv[k] || {};
          const mRow= MAESTRO.find(r => r.lote===l.lote && r.cultivo===cd.cult);
          const rP  = ov.proy != null ? ov.proy : (mRow ? (mRow.rindeEst||0) : 0);
          const rR  = ov.real != null ? ov.real : (mRow && mRow.rindeReal!=null ? mRow.rindeReal : rP); // default = proy
          const vP  = rP * ha * cd.precioP / tc;
          const vR  = rR != null ? rR * ha * cd.precioR / tc : null;
          h += '<tr style="cursor:pointer;" onclick="selectLote(\''+l.lote.replace(/'/g,"\\'")+'\');">'
            + tdL('padding-left:20px;font-size:12px;',
                '<span style="font-weight:700;">'+l.lote+'</span>'
                + ' <span style="font-size:10px;color:var(--txt3);">'+N3(ha)+' ha · '+l.campo+'</span>')
            + tdR(BG_P, C_P, '', usd(vP))
            + tdRL(BG_R, C_R, '', vR!=null?usd(vR):nd)
            + '</tr>';
        });
      }
    });

    // Producción y ventas totales
    h += '<tr>'
      + tdL('padding-left:20px;font-size:12px;font-weight:700;color:var(--txt);', 'Producción total (tn)')
      + tdR(BG_PB, C_P, '700', N3(totTnP)+' tn')
      + tdRL(BG_RB, C_R, '700', hasAnyReal?N3(totTnR)+' tn':nd)
      + '</tr>';
    h += '<tr>'
      + tdL('padding-left:20px;font-size:12px;font-weight:700;color:var(--txt);', 'Ventas')
      + tdR(BG_PB, C_P, '800', usd(totVentasP))
      + tdRL(BG_RB, C_R, '800', hasAnyReal?usd(totVentasR):nd)
      + '</tr>';
  }

  // ── GASTOS OPERATIVOS (colapsable) ──
  h += '<tr data-action="toggle-gastos" style="cursor:pointer;">'
    + tdL('background:#fdf0f0;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8b2020;border-top:2px solid var(--brd);border-bottom:1px solid var(--brd);',

function renderRentabilidad() {
  if (!selCliente || !selCultivo || !selLote) return;  // guard
  const tc     = getTC();
  const cult   = selCultivo;
  const _precioBase = getP(cult);
  // Precio manual por columna: si no fue editado, usa el precio base
  const _pOv = precioOv[keyCC(selCliente, cult)] || {};
  const precioP = _pOv.proy != null ? _pOv.proy : _precioBase;  // precio proyectado
  const precioR = _pOv.real != null ? _pOv.real : _precioBase;  // precio real
  const lotes  = getLotesByCult(selCliente, cult).filter(l => l.lote === selLote);

  // ── Calcular por lote ──
  let totHa=0, totTnP=0, totVentasP=0, totGastos=0, totTnR=0, totVentasR=0, hasAnyReal=false;

  const lotesCalc = lotes.map(l => {
    const ha   = l.ha;
    const k    = keyLC(l.lote, cult);
    const ov   = rindesOv[k] || {};
    const mRow = MAESTRO.find(r => r.lote === l.lote && r.cultivo === cult);
    const rP   = ov.proy != null ? ov.proy : (mRow ? (mRow.rindeEst  || 0) : 0);
    const rR   = ov.real != null ? ov.real : (mRow && mRow.rindeReal != null ? mRow.rindeReal : rP); // default = proy
    const tnP     = rP * ha;
    const tnR     = rR != null ? rR * ha : null;
    const ventasP = tnP * precioP / tc;   // USD: tn × precio_ARS / TC
    const ventasR = tnR != null ? tnR * precioR / tc : null;
    const gastos  = totalGastosLote(l.lote, cult, ha) + getAlquiler(l.lote, cult, ha).total;
    totHa += ha; totTnP += tnP; totVentasP += ventasP; totGastos += gastos;
    if (tnR != null) { totTnR += tnR; totVentasR += ventasR; hasAnyReal = true; }
    return { lote: l.lote, ha, rP, rR, tnP, tnR, ventasP, ventasR, gastos };
  });

  const totVR  = hasAnyReal ? totVentasR : null;
  const totTR2 = hasAnyReal ? totTnR     : null;
  const pctGC  = gastosComerciales.pct[cult] || 0;
  const totGCP = totVentasP * pctGC;
  const totGCR = totVR != null ? totVR * pctGC : null;
  // Todo en USD: ventas (precio_ARS/tc × tn) y gastos (col U del Excel)
  const totMOP = totVentasP - totGastos;
  const totMOR = totVR != null ? totVR - totGastos : null;
  const totBLP = totMOP - totGCP;
  const totBLR = totMOR != null ? totMOR - totGCR : null;

  // ── Rubros ──
  const rubroMap = {};
  lotes.forEach(l => {
    const haL = l.ha;  // ha actual del lote (puede haber sido editada)
    getGastosLote(l.lote, cult).forEach(r => {
      const rub = r[0] || 'Otros', prod = r[1] || '—';
      const costoHa  = costoHaInsumo(r);          // USD/ha = dosis × costo_u
      const totalIns = costoHa * haL;              // USD total = USD/ha × ha
      if (!rubroMap[rub]) rubroMap[rub] = { total: 0, insumos: {} };
      rubroMap[rub].total += totalIns;
      if (!rubroMap[rub].insumos[prod]) rubroMap[rub].insumos[prod] = {
        dosis: r[2], costo_u: r[3], costo_ha: costoHa, total: 0
      };
      rubroMap[rub].insumos[prod].total += totalIns;
    });
  });
  // Rubros fijos siempre presentes, aunque no tengan valor
  const RUBROS_FIJOS = ['Alquileres','Coadyuvantes','Curasemillas','Fertilizantes','Fungicidas','Herbicidas','Insecticidas','Labores Contratadas','Semillas'];
  RUBROS_FIJOS.forEach(r => { if (!rubroMap[r]) rubroMap[r] = { total:0, insumos:{} }; });
  // Add Alquileres — accumulate across all lotes of all cultivos
  lotes.forEach(l => {
    const ha_aq = l.ha;
    const aq = getAlquiler(l.lote, cult, ha_aq);
    rubroMap['Alquileres'].total += aq.total;
  });
  // Orden: fijos primero, luego cualquier otro
  const rubros = [
    ...RUBROS_FIJOS,
    ...Object.keys(rubroMap).filter(r => !RUBROS_FIJOS.includes(r)).sort()
  ];
  window._rubroMap = rubroMap;
  window._rubros   = rubros;
  window._lotesCalc = lotesCalc;
  window._cult     = cult;

  // ── Formato ──
  const nd  = '<span style="color:#c0c8c0;font-size:11px;">s/d</span>';

  // GC config
  if (showGCConfig) {
    const escCult = cult.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h += '<div class="gc-config"><h4>Gastos Comerciales — % sobre ventas</h4>'
      + '<div class="gc-row"><label>% de ventas</label>'

      + ' style="width:80px;padding:5px 8px;border:1px solid var(--brd);border-radius:4px;font-size:13px;outline:none;" />'
      + '<span style="font-size:11px;color:var(--txt3);">%</span></div>'
      + '<div style="font-size:11px;color:var(--txt3);margin-top:6px;">Proyectado: <strong>'+usd(totGCP)+'</strong> &nbsp;·&nbsp; Real: <strong>'+(totGCR!=null?usd(totGCR):nd)+'</strong></div>'
      + '</div>';
  }

  // KPIs
  h += '<div class="kpi-row">'
    + '<div class="kpi kb"><div class="kpi-l">Hectáreas</div><div class="kpi-v b">'+N3(totHa)+'</div><div class="kpi-s">'+lotes.length+' lotes</div></div>'
    + '<div class="kpi" style="border-top:3px solid '+HP+';"><div class="kpi-l">Ventas Proyectadas</div><div class="kpi-v" style="color:'+C_P+';">'+usd(totVentasP)+'</div><div class="kpi-s">Precio × Rinde Proy × Ha</div></div>'
    + (hasAnyReal ? '<div class="kpi kg"><div class="kpi-l">Ventas Reales</div><div class="kpi-v g">'+usd(totVR)+'</div><div class="kpi-s">Precio × Rinde Real × Ha</div></div>' : '')
    + '<div class="kpi k'+(totBLP/tc>=0?'g':'r')+'"><div class="kpi-l">Bottom Line Proy</div><div class="kpi-v '+(totBLP/tc>=0?'g':'r')+'">'+usd(totBLP)+'</div><div class="kpi-s">MO − G. Comerciales</div></div>'
    + (hasAnyReal && totBLR!=null ? '<div class="kpi k'+(totBLR/tc>=0?'g':'r')+'"><div class="kpi-l">Bottom Line Real</div><div class="kpi-v '+(totBLR/tc>=0?'g':'r')+'">'+usd(totBLR)+'</div><div class="kpi-s">MO Real − G. Comerciales</div></div>' : '')
    + '</div>';

  // Tabla
  h += '<div class="tbl-wrap-outer"><div class="tbl-card"><div class="tbl-card-hd"><span>Detalle · '+selCampo+' · '+cult+'</span></div><div class="tbl-wrap"><table id="rentTable">';

  // Headers
  h += '<tr>'
    + '<td style="background:#2a5c32;color:#fff;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;border-right:1px solid rgba(255,255,255,.15);min-width:220px;">Métrica</td>'

    + '<td style="text-align:center;font-family:\'Montserrat\',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;min-width:160px;background:'+HR+';color:#fff;">REAL</td>'

// ═══════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════
function setMode(cult, mode) {
  cultivoMode[keyCC(selCliente, cult)] = mode;
  renderCultivos();
  if (selCultivo === cult && selCampo) renderRentabilidad();
}

function setRinde(lote, cultivo, tipo, val) {
  const v = val.trim() === '' ? null : parseFloat(val);
  const k = keyLC(lote, cultivo);
  if (!rindesOv[k]) rindesOv[k] = {};
  rindesOv[k][tipo] = (v != null && !isNaN(v)) ? v : null;
  renderRentabilidad();
}

function updateHaLote(lote, cultivo, val) {
  const v = parseFloat(val);
  if (isNaN(v) || v < 0) return;
  const row = MAESTRO.find(r => r.lote === lote && r.cultivo === cultivo);
  if (row) {
    row.ha = v;
  } else {
    (extraCultivos[selCliente] || []).forEach(r => {
      if (r.lote === lote && r.cultivo === cultivo) r.ha = v;
    });
  }
  renderRentabilidad();
}

function updateHa(lote, cultivo, val) {
  const v = parseFloat(val);
  if (isNaN(v)) return;
  const row = MAESTRO.find(r => r.lote===lote && r.cultivo===cultivo);
  if (row) { row.ha = v; }
  else {
    (extraCultivos[selCliente]||[]).forEach(r => {
      if (r.lote===lote && r.cultivo===cultivo) r.ha=v;
    });
  }
  renderRentabilidad();
}

function toggleRubro(rub) {
  expandedRubros.has(rub) ? expandedRubros.delete(rub) : expandedRubros.add(rub);
  renderRentabilidad();
}

function toggleGCConfig() {
  showGCConfig = !showGCConfig;
  if (selLote) renderRentabilidad();
  else renderRentabilidadCliente();
}

function delCultivo(cult) {
  if (!deletedCultivos[selCliente]) deletedCultivos[selCliente] = new Set();
  deletedCultivos[selCliente].add(cult);
  if (selCultivo === cult) { selCultivo=null; selLote=null; }
  renderCultivos();
  if (!selCultivo) {
    $('secLote').style.display='none';
    $('panelContent').innerHTML=`<div class="empty-state"><div class="es-icon">🌿</div><div class="es-title">Seleccioná un cultivo</div></div>`;
  }
  updateBreadcrumb();
}

function doAddCultivo() {
  const sel  = $('newCult').value;
  const cult = sel==='OTRO' ? ($('newCultNombre').value.trim().toUpperCase()||'OTRO') : sel;
  const campo= ($('newCampoAdd').value.trim().toUpperCase()||'CAMPO');
  const lote = $('newLoteAdd').value.trim()||'Lote nuevo';
  const ha   = parseFloat($('newHaAdd').value)||0;
  const proy = parseFloat($('newProyAdd').value)||0;
  if (!selCliente) return;
  if (!extraCultivos[selCliente]) extraCultivos[selCliente]=[];
  extraCultivos[selCliente].push({ lote, cliente:selCliente, campo, ha, cultivo:cult, rindeEst:proy, rindeReal:null });
  closeAdd();
  renderCultivos();
}

// ── Breadcrumb ──
function updateBreadcrumb() {
  const steps = ['bc1','bc2','bc3','bc4'];
  const vals  = [selCliente, selCultivo, selLote, selLote ? 'ok' : null];
  steps.forEach((id,i) => {
    const el = $(id);
    el.classList.remove('active','done');
    if (vals[i]) {
      if (i < steps.length-1 && vals[i+1] != null) el.classList.add('done');
      else el.classList.add('active');
    } else if (i===0 || vals[i-1]) {
      el.classList.add('active');
    }
  });
  $('bc1val').textContent = selCliente ? selCliente.split(' ')[0] : '';
  $('bc2val').textContent = selCultivo || '';
  $('bc3val').textContent = selLote    || '';
  // click on done steps
  $('bc1').onclick = selCliente ? () => selectCliente(selCliente) : null;
  $('bc2').onclick = selCultivo ? () => selectCultivo(selCultivo) : null;
  $('bc3').onclick = selLote    ? () => selectLote(selLote)      : null;
}

init();


// ── REFRESH VIEW ──
function refreshView() {
  // Re-render current view without reloading the page
  if (selLote && selCultivo)   renderRentabilidad();
  else if (selCultivo)         renderRentabilidadCliente();
  else if (selCliente)         renderRentabilidadCliente();
  // Flash button feedback
  const btn = event?.target?.closest('button');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ Actualizado';
    setTimeout(() => btn.textContent = orig, 1200);
  }
}


// ── ALQUILERES ──
function getAlquiler(lote, cultivo, ha) {
  const k   = keyLC(lote, cultivo);
  const cfg = alquileres[k] || {};
  const haS = cfg.hasSoja != null ? cfg.hasSoja : 1.7;    // default 1.7 (ha de soja equivalente)
  const pS  = cfg.precioSoja != null ? cfg.precioSoja : getP('SOJA') / getTC(); // USD/tn
  const haL = ha != null ? ha : 1;  // hectáreas del lote
  // Total = hasSoja (equiv ha soja) × precio soja (USD/tn) × ha del lote
  return { hasSoja: haS, precioSoja: pS, total: haS * pS * haL };
}

function setAlquileres(lote, cultivo, field, val) {
  const k = keyLC(lote, cultivo);
  if (!alquileres[k]) alquileres[k] = {};
  alquileres[k][field] = parseFloat(val) || 0;
  if (selLote) renderRentabilidad(); else renderRentabilidadCliente();
}

function switchTab(tab) {
  const isGraf = tab === 'graficos';
  document.getElementById('page-graficos').style.display = isGraf ? 'block' : 'none';
  document.querySelector('.breadcrumb').style.display    = isGraf ? 'none'  : '';
  document.querySelector('.shell').style.display         = isGraf ? 'none'  : '';

  document.querySelectorAll('.nav-tab').forEach(b => {
    b.style.color        = 'rgba(255,255,255,.55)';
    b.style.borderBottom = '3px solid transparent';
  });
  const active = document.getElementById('tab-' + tab);
  if (active) {
    active.style.color        = '#fff';
    active.style.borderBottom = '3px solid var(--gold)';
  }

  if (isGraf) initGraficos();
}

// ═══════════════════════════════════════════
// GRÁFICOS — Chart.js
// ═══════════════════════════════════════════
let _charts = {};

function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

function initGraficos() {
  // Populate cultivo selector
  const sel = document.getElementById('grafCultivo');
  if (sel && sel.options.length === 0) {
    const cultivos = [...new Set(MAESTRO.map(r => r.cultivo))].sort();
    cultivos.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c; sel.appendChild(o);
    });
  }
  renderGraficos();
}

function calcClienteData(cult, tc) {
  const clientes = [...new Set(MAESTRO.filter(r=>r.cultivo===cult).map(r=>r.cliente))].sort();
  return clientes.map(cli => {
    const lotes = MAESTRO.filter(r => r.cliente===cli && r.cultivo===cult);
    let totHa=0, totTnP=0, totTnR=0, totGO=0, totVP=0, totVR=0, hasR=false;
    const pOv = precioOv[cli+'||'+cult] || {};
    const pP  = pOv.proy != null ? pOv.proy : getP(cult);
    const pR  = pOv.real != null ? pOv.real : getP(cult);
    lotes.forEach(l => {
      const ha  = l.ha;
      const k   = keyLC(l.lote, cult);
      const ov  = rindesOv[k] || {};
      const mRow= l;
      const rP  = ov.proy != null ? ov.proy : (mRow.rindeEst||0);
      const rR  = ov.real != null ? ov.real : (mRow.rindeReal!=null ? mRow.rindeReal : rP);
      totHa  += ha;
      totTnP += rP * ha;
      totTnR += rR * ha;
      totVP  += rP * ha * pP / tc;
      totVR  += rR * ha * pR / tc;
      totGO  += totalGastosLote(l.lote, cult, ha);
      if (mRow.rindeReal != null || ov.real != null) hasR = true;
    });
    const rindeP  = totHa > 0 ? totTnP / totHa : 0;
    const rindeR  = totHa > 0 ? totTnR / totHa : 0;
    const ventPha = totHa > 0 ? totVP  / totHa : 0;
    const ventRha = totHa > 0 ? totVR  / totHa : 0;
    const goHa    = totHa > 0 ? totGO  / totHa : 0;
    const moP     = totHa > 0 ? (totVP - totGO) / totHa : 0;
    const moR     = totHa > 0 ? (totVR - totGO) / totHa : 0;
    return { cli, totHa, rindeP, rindeR, ventPha, ventRha, goHa, moP, moR };
  });
}

function renderGraficos() {
  const cultivo = document.getElementById('grafCultivo')?.value;
  const metrica = document.getElementById('grafMetrica')?.value || 'ventas';
  if (!cultivo) return;

  const tc   = getTC();
  const data = calcClienteData(cultivo, tc);
  if (!data.length) return;

  const labels  = data.map(d => d.cli.split(' ')[0]);
  const COLORS  = ['#1a4f8a','#2d7a3a','#b8922a','#b83232','#4a9e58','#880e4f','#1565c0','#e65100'];
  const colorsArr = data.map((_,i) => COLORS[i % COLORS.length]);

  // ── Gráfico principal: clientes vs promedio ──
  const metricaLabel = { ventas:'Ventas (USD/ha)', rinde:'Rendimiento (tn/ha)', mo:'Margen Op. (USD/ha)', gastos:'Gastos Op. (USD/ha)' }[metrica];
  const getPval = d => ({ ventas:d.ventPha, rinde:d.rindeP, mo:d.moP, gastos:d.goHa }[metrica]);
  const getRval = d => ({ ventas:d.ventRha, rinde:d.rindeR, mo:d.moR, gastos:d.goHa }[metrica]);
  const valsP   = data.map(getPval);
  const valsR   = data.map(getRval);
  const avgP    = valsP.reduce((s,v)=>s+v,0) / valsP.length;
  const avgR    = valsR.reduce((s,v)=>s+v,0) / valsR.length;

  destroyChart('principal');
  const ctx1 = document.getElementById('canvasPrincipal').getContext('2d');
  _charts['principal'] = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Proyectado',
          data: valsP.map(v => Math.round(v)),
          backgroundColor: 'rgba(26,79,138,.7)',
          borderColor: '#1a4f8a', borderWidth: 1.5, borderRadius: 4,
        },
        {
          label: 'Real',
          data: valsR.map(v => Math.round(v)),
          backgroundColor: 'rgba(30,77,38,.7)',
          borderColor: '#1e4d26', borderWidth: 1.5, borderRadius: 4,
        },
        {
          label: 'Promedio Proy',
          data: data.map(() => Math.round(avgP)),
          type: 'line', borderColor: '#b8922a', borderWidth: 2,
          borderDash: [6,3], pointRadius: 0, fill: false,
        },
        {
          label: 'Promedio Real',
          data: data.map(() => Math.round(avgR)),
          type: 'line', borderColor: '#4a9e58', borderWidth: 2,
          borderDash: [6,3], pointRadius: 0, fill: false,
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: cultivo + ' · ' + metricaLabel + ' por cliente', font: { size: 13, weight: '700', family: 'Montserrat' } },
        legend: { position: 'bottom', labels:{boxWidth:12,padding:8,font:{size:11}} },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString('es-AR') } }
      },
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString('es-AR') } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });

  // ── Gráfico 2: Rendimientos Proy vs Real ──
  destroyChart('rindes');
  const ctx2 = document.getElementById('canvasRindes').getContext('2d');
  const avgRP = data.map(d=>d.rindeP).reduce((s,v)=>s+v,0)/data.length;
  const avgRR = data.map(d=>d.rindeR).reduce((s,v)=>s+v,0)/data.length;
  _charts['rindes'] = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Rinde Proy (tn/ha)', data:data.map(d=>+d.rindeP.toFixed(2)), backgroundColor:'rgba(26,79,138,.6)', borderColor:'#1a4f8a', borderWidth:1.5, borderRadius:4 },
        { label:'Rinde Real (tn/ha)', data:data.map(d=>+d.rindeR.toFixed(2)), backgroundColor:'rgba(30,77,38,.6)', borderColor:'#1e4d26', borderWidth:1.5, borderRadius:4 },
        { label:'Prom Proy', data:data.map(()=>+avgRP.toFixed(2)), type:'line', borderColor:'#b8922a', borderWidth:2, borderDash:[6,3], pointRadius:0, fill:false },
        { label:'Prom Real', data:data.map(()=>+avgRR.toFixed(2)), type:'line', borderColor:'#4a9e58', borderWidth:2, borderDash:[6,3], pointRadius:0, fill:false },
      ]
    },
    options: {
      responsive:true,
      plugins: { title:{ display:true, text: cultivo+' · Rendimiento (tn/ha) por cliente', font:{size:13,weight:'700',family:'Montserrat'}}, legend:{position:'bottom', labels:{boxWidth:12,padding:8,font:{size:11}}} },
      scales: { y:{ beginAtZero:true }, x:{ ticks:{font:{size:9}} } }
    }
  });

  // ── Gráfico 3: Composición gastos por rubro (radar o doughnut) ──
  // All clients together for selected cultivo
  destroyChart('gastos');
  const ctx3 = document.getElementById('canvasGastos').getContext('2d');
  const RUBROS_F = ['Labores Contratadas','Herbicidas','Fertilizantes','Semillas','Coadyuvantes','Insecticidas','Fungicidas','Curasemillas'];
  const rubroTots = {};
  RUBROS_F.forEach(r => rubroTots[r] = 0);
  MAESTRO.filter(m=>m.cultivo===cultivo).forEach(m => {
    getGastosLote(m.lote, cultivo).forEach(r => {
      const rub = r[0]||'Otros';
      if (!rubroTots[rub]) rubroTots[rub] = 0;
      rubroTots[rub] += (r[4]||0) * m.ha;
    });
  });
  const rubLabels = Object.keys(rubroTots).filter(r=>rubroTots[r]>0);
  const rubVals   = rubLabels.map(r=>Math.round(rubroTots[r]));
  const rubColors = ['#1a4f8a','#b83232','#b8922a','#2d7a3a','#4a9e58','#880e4f','#e65100','#1565c0'];
  _charts['gastos'] = new Chart(ctx3, {
    type: 'doughnut',
    data: { labels:rubLabels, datasets:[{ data:rubVals, backgroundColor:rubColors.slice(0,rubLabels.length), borderWidth:2 }] },
    options: {
      responsive:true, maintainAspectRatio: false,
      plugins: {
        title:{ display:true, text: cultivo+' · Composición Gastos Operativos', font:{size:13,weight:'700',family:'Montserrat'}},
        legend:{position:'right', labels:{font:{size:9}}},
        tooltip:{ callbacks:{ label: c => c.label+': USD '+c.parsed.toLocaleString('es-AR') } }
      }
    }
  });

  // ── Gráfico 4: Margen Operativo por cliente (waterfall-style stacked) ──
  destroyChart('mo');
  const ctx4 = document.getElementById('canvasMO').getContext('2d');
  _charts['mo'] = new Chart(ctx4, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Ventas P (USD/ha)', data:data.map(d=>Math.round(d.ventPha)), backgroundColor:'rgba(26,79,138,.5)', borderColor:'#1a4f8a', borderWidth:1.5, borderRadius:4 },
        { label:'Gastos Op (USD/ha)', data:data.map(d=>-Math.round(d.goHa)), backgroundColor:'rgba(184,50,50,.5)', borderColor:'#b83232', borderWidth:1.5, borderRadius:4 },
        { label:'MO Proy (USD/ha)', data:data.map(d=>Math.round(d.moP)), backgroundColor:'rgba(45,122,58,.7)', borderColor:'#2d7a3a', borderWidth:1.5, borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio: false,
      plugins: { title:{display:true, text:cultivo+' · Ventas vs Gastos vs MO (USD/ha)', font:{size:13,weight:'700',family:'Montserrat'}}, legend:{position:'bottom', labels:{boxWidth:12,padding:8,font:{size:11}}} },
      scales: { y:{ ticks:{callback:v=>v.toLocaleString('es-AR')} }, x:{ticks:{font:{size:9}}} }
    }
  });

  // ── Gráfico 5: Ha por cliente (bubble / horizontal bar) ──
  destroyChart('rubros');
  const ctx5 = document.getElementById('canvasRubros').getContext('2d');
  _charts['rubros'] = new Chart(ctx5, {
    type: 'bar',
    data: {
      labels,
      datasets:[{
        label:'Hectáreas',
        data: data.map(d=>d.totHa),
        backgroundColor: colorsArr.map(c=>c+'bb'),
        borderColor: colorsArr,
        borderWidth:1.5, borderRadius:4
      }]
    },
    options: {
      indexAxis:'y',
      responsive:true, maintainAspectRatio: false,
      plugins:{ title:{display:true, text:cultivo+' · Hectáreas por cliente', font:{size:13,weight:'700',family:'Montserrat'}}, legend:{display:false} },
      scales:{ x:{ beginAtZero:true }, y:{ticks:{font:{size:9}}} }
    }
  });
}


function refreshData() {
  // Re-render without resetting navigation state
  if (selLote)         renderRentabilidad();
  else if (selCultivo) renderRentabilidadCliente();
  else if (selCliente) renderRentabilidadCliente();
  // Show brief visual feedback
  const btn = document.querySelector('[onclick="refreshData()"]');
  if (btn) {
    btn.style.transform = 'rotate(360deg)';
    btn.style.transition = 'transform 0.4s ease';
    setTimeout(() => { btn.style.transform = ''; btn.style.transition = 'all .15s'; }, 400);
  }
}
